<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TexForge – Spritesheet Tools</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>

<body>

    <!-- HEADER -->
    <header class="navbar">
        <a href="index.html" class="logo">
            <div class="logo">
                <img src="face icon.png" height="70px" width="70px">
                <h1>paw<span class="dot">X</span></h1>
            </div>
        </a>

        <nav class="nav-btns">
        </nav>
    </header>

    <!-- HERO SECTION -->
    <section class="hero">
        <h2>SPRITESHEET builder <br> FOR <span class="orange">GAME DEVS</span></h2>
        <p class="subtext">TRANSFORM YOUR AI GENERATED VIDEO INTO GAME READY SPRITE SHEET 2D ASSETS</p>
    </section>

    <!-- MAIN TOOL SECTION -->
    <section class="tool-wrapper">

        <!-- BIG UPLOAD BOX (VISIBLE FIRST) -->

        <div class="big-drop" id="videoDropZone">
            <input type="file" id="videoUpload" accept="video/mp4,video/x-m4v,video/*">
            <p>Drop video here<br><span>or click to browse</span></p>
        </div>

        <!-- HIDDEN TOOL UI (SHOW AFTER IMAGE UPLOAD) -->
        <div class="tool-content" id="toolContent">

            <!-- LEFT PANEL -->
            <div class="left-panel">
                <h3>OPTIONS</h3>

                <div class="options">
                    
                    <h4>STEP 1: FRAME EXTRACTION</h4>
                    <label>Extract <input type="number" id="fpsRate" value="1" min="1" max="60" style="width: 50px; background: #222; border: 1px solid #333; color: white;"> frame(s) per second</label>
                    <button type="button" class="process-btn" id="extractBtn">⚡ EXTRACT FRAMES</button>
                    <button type="button" id="aiRemoveBgBtn" style="width: 100%; padding: 12px; margin-top: 10px; background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color: #fff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase;" disabled>✨ AI REMOVE BACKGROUNDS</button>
                    <button type="button" id="downloadFramesBtn" style="width: 100%; padding: 12px; margin-top: 10px; background: transparent; color: #ff6a00; border: 2px solid #ff6a00; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase;" disabled>⬇ DOWNLOAD FRAMES (ZIP)</button>

                    <hr style="border-color: #333; margin: 20px 0;">

                    <h4>STEP 2: SPRITESHEET LAYOUT</h4>
                    <select id="gridLayout">
                        <option value="auto">Auto Best Fit</option>
                        <option value="4x4">4x4 Grid</option>
                        <option value="8x8">8x8 Grid</option>
                        <option value="row">Single Row</option>
                    </select>

                    <button type="button" class="process-btn" id="generateBtn" style="margin-top: 15px;" disabled>▶ GENERATE SPRITESHEET</button>
                    <button type="button" id="downloadBtnSidebar" style="width: 100%; padding: 12px; margin-top: 10px; background: #ff9e2c; color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase;" disabled>⬇ DOWNLOAD SPRITESHEET</button>
                </div>
            </div>

            <!-- RIGHT PANEL -->
            <div class="right-panel">
                <div class="preview-header">
                    <span class="active-tab" id="tabFrames">EXTRACTED FRAMES</span>
                    <span id="tabResult">SPRITESHEET</span>
                </div>

                <div class="preview-box" id="previewContainer">
                    <p id="previewText">No video uploaded<br><span>Upload a video to get started</span></p>
                    <video id="previewVideo" style="display: none;" controls></video>
                    
                    <!-- Frame Selection Gallery -->
                    <div id="frameGallery" style="display: none; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; padding: 10px; box-sizing: border-box;">
                        <!-- Frames will be injected here -->
                    </div>

                    <!-- Final Spritesheet Result -->
                    <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
                        <img id="previewImage" style="display: none; max-width: 100%; border-radius: 6px; border: 1px solid #555;">
                        <!-- Buttons moved to sidebar -->
                    </div>
                </div>
            </div>

        </div>
    </section>

    <!-- JSZip for Zip Download -->

    <!-- JSZip for Zip Download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <!-- Base UI Script -->
    <script src="script.js?v=20"></script>
    <script src="spritesheet_logic.js?v=20"></script>
</body>

</html>
