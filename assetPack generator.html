<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TexForge – Asset Pack Generator</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>

<body>

    <!-- HEADER -->
    <header class="navbar">
        <a href="index.html" class="logo">
            <div class="logo">
                <img src="face icon.png" height="70px" width="70px">
                <h1>paw<span class="dot">X</span></h1>
            </div>
        </a>

        <nav class="nav-btns">
        </nav>
    </header>

    <!-- HERO SECTION -->
    <section class="hero">
        <h2>ASSET PACK GENERATOR <br> FOR <span class="orange">GAME DEVS</span></h2>
    </section>

    <!-- MAIN TOOL SECTION -->
    <section class="tool-wrapper">

        <!-- BIG UPLOAD BOX (VISIBLE FIRST) -->

        <div class="big-drop" id="imageDropZone">
            <input type="file" id="imageUploadBtn" accept="image/*">
            <p>Drop image here<br><span>or click to browse</span></p>
        </div>

        <!-- HIDDEN TOOL UI (SHOW AFTER IMAGE UPLOAD) -->
        <div class="tool-content" id="toolContent">

            <!-- LEFT PANEL -->
            <div class="left-panel">
                <h3>OPTIONS</h3>

                <div class="options">
                    
                    <h4>SELECT OBJECTS</h4>
                    <p style="font-size: 0.85rem; color: #ccc; margin-bottom: 10px;">Click on the image to place points on the objects you want to extract.</p>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <span id="pointCount">Points: 0</span>
                        <button type="button" id="clearPointsBtn" style="background: transparent; border: 1px solid #555; color: white; padding: 5px 10px; cursor: pointer; border-radius: 4px;">Clear Points</button>
                    </div>

                    <hr style="border-color: #333; margin: 20px 0;">

                    <!-- <h4>STEP 2: EXTRACTION</h4> -->
                    <!-- <label><input type="checkbox" id="aiBgRemoval"> Auto Remove Background (Step 1)</label>     -->

                    <button type="button" class="process-btn" id="extractBtn" style="margin-top: 15px;" disabled>▶ EXTRACT SPRITES</button>
                    <button type="button" id="downloadFramesBtn" style="width: 100%; padding: 12px; margin-top: 10px; background: transparent; color: #ff6a00; border: 2px solid #ff6a00; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase;" disabled>⬇ DOWNLOAD SPRITES (ZIP)</button>
                </div>
            </div>

            <!-- RIGHT PANEL -->
            <div class="right-panel">
                <div class="preview-header">
                    <span class="active-tab" id="tabInput">INPUT IMAGE</span>
                    <span id="tabResult">EXTRACTED SPRITES</span>
                </div>

                <div class="preview-box" id="previewContainer">
                    <p id="previewText">No image uploaded<br><span>Upload an image to get started</span></p>
                    
                    <!-- Canvas for Point and Click -->
                    <div id="canvasContainer" style="display: none; width: 100%; height: 100%; text-align: center;">
                        <canvas id="imageCanvas" style="cursor: crosshair;"></canvas>
                    </div>
                    
                    <!-- Frame Selection Gallery (Results) -->
                    <div id="frameGallery" style="display: none; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; padding: 10px; box-sizing: border-box;">
                        <!-- Sprites will be injected here -->
                    </div>
                </div>
            </div>

        </div>
    </section>

    <!-- JSZip for Zip Download -->

    <!-- JSZip for Zip Download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <!-- Base UI Script -->
    <script src="script.js?v=10"></script>
    
    <!-- Asset Pack Specific Logic -->
    <script src="assetpack_logic.js?v=10"></script>
</body>

</html>
